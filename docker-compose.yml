services:
  mongo:
    image: mongo:7
    container_name: trms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
      - ./sample-data:/seed-data:ro

  app:
    build: .
    container_name: trms-app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - DB_NAME=trms
      - PORT=3000

volumes:
  mongo_data:
